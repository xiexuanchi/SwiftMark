<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftMark - 极简 Markdown 笔记</title>
    <!-- Use Vditor CDN for assets -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vditor/dist/index.css" />
    <style>
        :root {
            /* Apple Font Family */
            --apple-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
        }
        body {
            margin: 0;
            padding: 0;
            font-family: var(--apple-font);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #fff;
        }
        header {
            padding: 10px 20px;
            background-color: #f6f6f6;
            border-bottom: 1px solid #dcdcdc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            -webkit-app-region: drag;
        }
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        #sidebar {
            width: 260px;
            background-color: #f3f2f2;
            border-right: 1px solid #dcdcdc;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .sidebar-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .note-list-item {
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid #e5e5e5;
            transition: background-color 0.2s;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .note-list-item:hover .delete-btn {
            display: block;
        }
        .delete-btn {
            display: none;
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background-color: #ff3b30;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 10px;
            cursor: pointer;
        }
        .note-list-item:hover {
            background-color: #e8e7e7;
        }
        .note-list-item.active {
            background-color: #d1d1d1;
        }
        .note-title {
            font-weight: 500;
            font-size: 14px;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .note-date {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        #editor-container {
            flex: 1;
            height: 100%;
            position: relative;
        }
        #editor {
            height: 100% !important;
        }
        .controls {
            -webkit-app-region: no-drag;
            display: flex;
            gap: 8px;
        }
        button {
            background-color: #fff;
            border: 1px solid #d1d1d1;
            padding: 4px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-family: var(--apple-font);
            font-size: 12px;
            color: #333;
        }
        button:hover {
            background-color: #f8f8f8;
        }
        button.primary {
            background-color: #007aff;
            color: #fff;
            border-color: #007aff;
        }
        button.primary:hover {
            background-color: #0063d1;
        }
        /* Customize Vditor styles to match Apple font */
        .vditor-reset {
            font-family: var(--apple-font) !important;
        }
    </style>
</head>
<body>
    <header>
        <h1>SwiftMark</h1>
        <div class="controls">
            <button id="newNoteBtn" class="primary">新建笔记</button>
            <button id="openBtn">导入</button>
            <button id="saveBtn">另存为</button>
        </div>
    </header>
    <div class="main-container">
        <div id="sidebar">
            <div id="noteList"></div>
        </div>
        <div id="editor-container">
            <div id="editor"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vditor/dist/index.min.js"></script>
    <script src="renderer.js"></script>
</body>
</html>
